apiVersion: 1

datasources:
  - name: DevLake
    type: mysql
    url: devlake-mysql:3306
    database: lake
    user: merico
    secureJsonData:
      password: "${DEVLAKE_MYSQL_PASSWORD:-devlake}"
    jsonData:
      maxOpenConns: 10
      maxIdleConns: 5
      connMaxLifetime: 14400
      tlsSkipVerify: true
    isDefault: true
    editable: false
    uid: devlake-mysql-ds
