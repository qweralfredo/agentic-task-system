services:
  postgres:
    image: postgres:17-alpine
    container_name: agentic-postgres
    environment:
      POSTGRES_DB: agentic_todolist
      POSTGRES_USER: agentic
      POSTGRES_PASSWORD: agentic
    ports:
      - "55432:5432"
    volumes:
      - ./ops/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentic -d agentic_todolist"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/AgenticTodoList.Api
    container_name: agentic-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=agentic_todolist;Username=agentic;Password=agentic
    ports:
      - "58080:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:58080
    container_name: agentic-frontend
    depends_on:
      - api
    ports:
      - "53000:80"
