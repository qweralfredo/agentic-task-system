services:
  postgres:
    image: postgres:17-alpine
    container_name: pandora-postgres
    environment:
      POSTGRES_DB: pandora_todo_list
      POSTGRES_USER: pandora
      POSTGRES_PASSWORD: pandora
    ports:
      - "8432:5432"
    volumes:
      - ./ops/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U Pandora -d pandora_todo_list"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend/AgenticTodoList.Api
    container_name: pandora-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=pandora_todo_list;Username=pandora;Password=pandora
    ports:
      - "8480:8080"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8480
    container_name: pandora-frontend
    depends_on:
      - api
    ports:
      - "8400:80"

  mcp:
    build:
      context: ./mcp-server-python
    container_name: pandora-mcp
    depends_on:
      - api
    environment:
      PANDORA_API_BASE_URL: http://api:8080
      PANDORA_API_TIMEOUT: 30
      PANDORA_MCP_TRANSPORT: streamable-http
      PANDORA_MCP_HOST: 0.0.0.0
      PANDORA_MCP_PORT: 8000
      PANDORA_MCP_MOUNT_PATH: /
    ports:
      - "8481:8000"

