services:
  # ===========================================================================
  # Pandora Core Stack (sempre inicializado)
  # ===========================================================================
  postgres:
    image: postgres:17-alpine
    container_name: pandora-postgres
    environment:
      POSTGRES_DB: pandora_todo_list
      POSTGRES_USER: pandora
      POSTGRES_PASSWORD: pandora
    ports:
      - "8432:5432"
    volumes:
      - ./ops/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pandora -d pandora_todo_list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pandora-net

  api:
    build:
      context: ./backend/AgenticTodoList.Api
    container_name: pandora-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=pandora_todo_list;Username=pandora;Password=pandora
    ports:
      - "8480:8080"
    networks:
      - pandora-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8480
    container_name: pandora-frontend
    depends_on:
      - api
    ports:
      - "8400:80"
    networks:
      - pandora-net

  mcp:
    build:
      context: ./mcp-server-python
    container_name: pandora-mcp
    depends_on:
      - api
    environment:
      PANDORA_API_BASE_URL: http://api:8080
      PANDORA_API_TIMEOUT: 30
      PANDORA_MCP_TRANSPORT: streamable-http
      PANDORA_MCP_HOST: 0.0.0.0
      PANDORA_MCP_PORT: 8000
      PANDORA_MCP_MOUNT_PATH: /
    ports:
      - "8481:8000"
    networks:
      - pandora-net

  # ===========================================================================
  # DevLake Stack (profile: devlake)
  # Uso: docker compose --profile devlake up -d
  # ===========================================================================

  devlake-mysql:
    image: mysql:8.0
    container_name: devlake-mysql
    profiles: [devlake]
    environment:
      MYSQL_ROOT_PASSWORD: ${DEVLAKE_MYSQL_ROOT_PASSWORD:-devlake_root}
      MYSQL_DATABASE: lake
      MYSQL_USER: merico
      MYSQL_PASSWORD: ${DEVLAKE_MYSQL_PASSWORD:-devlake}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb_buffer_pool_size=512M
      - --max_connections=200
    volumes:
      - ./ops/devlake/mysql/data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-u", "root", "-p${DEVLAKE_MYSQL_ROOT_PASSWORD:-devlake_root}", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - pandora-devlake-net

  devlake:
    image: devlake/lake:v0.21.1
    container_name: devlake
    profiles: [devlake]
    depends_on:
      devlake-mysql:
        condition: service_healthy
    environment:
      DB_URL: ${DEVLAKE_DB_URL:-mysql://merico:devlake@devlake-mysql:3306/lake?charset=utf8mb4&parseTime=True&loc=UTC}
      ENV: production
      PORT: "8080"
      NOTIFICATION_ENDPOINT: ""
      ENCRYPTION_SECRET: ${DEVLAKE_ENCRYPTION_SECRET:-pandora-devlake-secret-change-in-prod}
    ports:
      - "8082:8080"
    volumes:
      - ./ops/devlake/config:/app/.env:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:8080/api/version || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    restart: unless-stopped
    networks:
      - pandora-devlake-net
      - pandora-net

  devlake-config-ui:
    image: devlake/config-ui:v0.21.1
    container_name: devlake-config-ui
    profiles: [devlake]
    depends_on:
      devlake:
        condition: service_healthy
    environment:
      DEVLAKE_ENDPOINT: http://devlake:8080
      GRAFANA_ENDPOINT: http://grafana:3000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -sf http://localhost:4000 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pandora-devlake-net

  grafana:
    image: grafana/grafana-oss:10.4.3
    container_name: grafana
    profiles: [devlake]
    depends_on:
      devlake-mysql:
        condition: service_healthy
    environment:
      GF_SERVER_ROOT_URL: http://localhost:3002
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-pandora-grafana}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_DATABASE_URL: ${DEVLAKE_DB_URL:-mysql://merico:devlake@devlake-mysql:3306/lake?charset=utf8mb4&parseTime=True&loc=UTC}
    ports:
      - "3002:3000"
    volumes:
      - ./ops/devlake/grafana/data:/var/lib/grafana
      - ./ops/devlake/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./ops/devlake/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - pandora-devlake-net
      - pandora-net

  pandora-devlake-collector:
    image: pandora-devlake-plugin:latest
    container_name: pandora-devlake-collector
    profiles: [devlake]
    build:
      context: ./ops/devlake/pandora-plugin
      dockerfile: Dockerfile
    depends_on:
      devlake:
        condition: service_healthy
    environment:
      PANDORA_API_URL: http://pandora-api:5000
      DEVLAKE_URL: http://devlake:8080
      DEVLAKE_WEBHOOK_ID: ${DEVLAKE_WEBHOOK_ID:-1}
      PANDORA_PROJECT_ID: ${PANDORA_PROJECT_ID:-}
      POLL_INTERVAL_SEC: ${POLL_INTERVAL_SEC:-300}
    restart: unless-stopped
    networks:
      - pandora-net
      - pandora-devlake-net

# =============================================================================
# Networks
# =============================================================================
networks:
  pandora-net:
    name: pandora-net
    driver: bridge

  pandora-devlake-net:
    name: pandora-devlake-net
    driver: bridge
