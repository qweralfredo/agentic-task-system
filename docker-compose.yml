services:
  # ===========================================================================
  # Pandora Core Stack (sempre inicializado)
  # ===========================================================================
  postgres:
    image: postgres:17-alpine
    container_name: pandora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pandora_todo_list
      POSTGRES_USER: pandora
      POSTGRES_PASSWORD: pandora
    ports:
      - "8432:5432"
    volumes:
      - ./ops/postgres/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pandora -d pandora_todo_list"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - pandora-net

  api:
    build:
      context: ./backend/AgenticTodoList.Api
    container_name: pandora-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__Postgres: Host=postgres;Port=5432;Database=pandora_todo_list;Username=pandora;Password=pandora
      Auth__ApiKeys__0: ${PANDORA_API_KEY:-dev-api-key}
    ports:
      - "8480:8080"
    networks:
      - pandora-net

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8480
    container_name: pandora-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8400:80"
    networks:
      - pandora-net

  postgres-backup:
    image: postgres:17-alpine
    container_name: pandora-postgres-backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: pandora_todo_list
      PGUSER: pandora
      PGPASSWORD: pandora
      BACKUP_DIR: /backups
      KEEP_DAYS: ${BACKUP_KEEP_DAYS:-7}
    volumes:
      - ./ops/postgres/backups:/backups
    entrypoint: >
      sh -c "
        mkdir -p /backups &&
        echo '*/30 * * * * pg_dump -Fc -f /backups/pandora-\$$(date +%Y%m%d-%H%M%S).dump && find /backups -name \"*.dump\" -mtime +$$KEEP_DAYS -delete && echo \"Backup OK \$$(date)\"' > /etc/crontabs/root &&
        crond -f -l 6
      "
    restart: unless-stopped
    networks:
      - pandora-net

  mcp:
    build:
      context: ./mcp-server-python
    container_name: pandora-mcp
    restart: unless-stopped
    depends_on:
      - api
    environment:
      PANDORA_API_BASE_URL: http://api:8080
      PANDORA_API_TIMEOUT: 30
      PANDORA_MCP_TRANSPORT: streamable-http
      PANDORA_MCP_HOST: 0.0.0.0
      PANDORA_MCP_PORT: 8000
      PANDORA_MCP_MOUNT_PATH: /
    ports:
      - "127.0.0.1:8481:8000"
    networks:
      - pandora-net

  superset:
    image: apache/superset:latest
    container_name: pandora-superset
    restart: unless-stopped
    environment:
      SUPERSET_SECRET_KEY: ${SUPERSET_SECRET_KEY:-a_very_secret_and_secure_key_12345}
      SQLALCHEMY_DATABASE_URI: postgresql+psycopg2://pandora:pandora@postgres:5432/pandora_todo_list
      SUPERSET_LOAD_EXAMPLES: 'no'
    ports:
      - "8088:8088"
    volumes:
      - ./ops/superset/superset-init.sh:/app/superset-init.sh
    command: ["/bin/bash", "/app/superset-init.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pandora-net

# =============================================================================
# Networks
# =============================================================================
networks:
  pandora-net:
    name: pandora-net
    driver: bridge

