name: DevLake Pandora Plugin CI

on:
  push:
    paths:
      - 'ops/devlake/pandora-plugin/**'
  pull_request:
    paths:
      - 'ops/devlake/pandora-plugin/**'

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ops/devlake/pandora-plugin

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Test with coverage
        run: |
          go test ./... -coverprofile=coverage.out -covermode=atomic -v
          go tool cover -func=coverage.out | tail -1

      - name: Enforce ≥80% coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | tail -1 | awk '{print $3}' | tr -d '%')
          echo "Total coverage: $COVERAGE%"
          awk "BEGIN { if ($COVERAGE < 80) { print \"Coverage $COVERAGE% is below 80%\"; exit 1 } }"

      - name: Build binary
        run: go build -o bin/pandora-plugin ./cmd/...
