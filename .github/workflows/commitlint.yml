name: Commit Lint

on: [pull_request]

jobs:
  commitlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install commitlint
        run: |
          npm install -g @commitlint/cli @commitlint/config-conventional
      - name: Validate PR title
        run: |
          echo "${{ github.event.pull_request.title }}" | commitlint
