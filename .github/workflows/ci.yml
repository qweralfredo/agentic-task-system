name: CI Pipeline

on:
  push:
    branches: [ main, develop, 'task/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore backend/AgenticTodoList.slnx

      - name: Build
        run: dotnet build backend/AgenticTodoList.slnx --no-restore

      - name: Test
        run: dotnet test backend/AgenticTodoList.slnx --no-build --verbosity normal

      - name: Format Check
        run: dotnet format backend/AgenticTodoList.slnx --verify-no-changes

  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Build
        working-directory: frontend
        run: npm run build

  python_mcp:
    name: Python MCP CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: mcp-server-python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest black ruff

      - name: Lint with Ruff
        working-directory: mcp-server-python
        run: ruff check .

      - name: Format Check with Black
        working-directory: mcp-server-python
        run: black --check .

      - name: Test with pytest
        working-directory: mcp-server-python
        run: pytest

  self_healing:
    name: Self-Healing & Lint
    needs: [backend, frontend, python_mcp]
    if: github.event_name == 'pull_request' && failure()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
      
      - name: Fix Backend Formatting
        run: |
          dotnet format backend/AgenticTodoList.slnx || true

      - name: Fix Frontend Formatting
        working-directory: frontend
        run: |
          npm run lint -- --fix || true

      - name: Fix Python Formatting
        working-directory: mcp-server-python
        run: |
          python -m pip install black ruff
          black . || true
          ruff check . --fix || true

      - name: Commit fixes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: automated self-healing fixes [ci skip]"
          branch: ${{ github.head_ref }}
